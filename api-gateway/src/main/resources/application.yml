spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins:
              - "http://localhost:5173"
              - "https://hospital-management-system-lilac-theta.vercel.app"
              - "https://hms-eureka.vercel.app"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
              - PATCH
            allowedHeaders: "*"
            allowCredentials: true

      routes:
        - id: auth-service
          uri: lb://AUTH-SERVICE
          predicates:
            - Path=/auth/**, /users/**

        - id: hms-service
          uri: lb://HMS-SERVICE
          predicates:
            - Path=/patients/**, /doctors/**, /rooms/**, /admissions/**, /treatments/**, /bill/**

server:
  port: 8080

eureka:
  client:
    service-url:
      defaultZone: https://hms-eureka-xlce.onrender.com/eureka/

  instance:
    prefer-ip-address: true