services:
  # MySQL Database Service
  mysql-db:
    image: mysql:8.0
    container_name: hms-mysql-db
    ports:
      - "3306:3306"
    environment:
      MYSQL_DATABASE: hms_db
      MYSQL_USER: hms_user
      MYSQL_PASSWORD: hms_pass
      MYSQL_ROOT_PASSWORD: hms_root_pass
    volumes:
      - mysql-data:/var/lib/mysql
    networks:
      - hms-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p$$MYSQL_ROOT_PASSWORD"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Eureka Discovery Server
  eureka-server:
    build:
      context: ./Eureka/Eureka
      dockerfile: Dockerfile
    container_name: hms-eureka-server
    ports:
      - "8761:8761"
    networks:
      - hms-network
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8761/eureka/"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Authentication Microservice
  auth-service:
    build:
      context: ./auth-service
      dockerfile: Dockerfile
    container_name: hms-auth-service
    ports:
      - "8081:8081"
    environment:
      - PORT=8081
      - DB_URL=jdbc:mysql://mysql-db:3306/hms_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
      - DB_USER=hms_user
      - DB_PASSWORD=hms_pass
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka/
      - EUREKA_INSTANCE_PREFER_IP_ADDRESS=true
    depends_on:
      mysql-db:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
    networks:
      - hms-network

  # HMS Core Microservice
  hms-service:
    build:
      context: ./hms-service
      dockerfile: Dockerfile
    container_name: hms-core-service
    ports:
      - "8082:8082"
    environment:
      - PORT=8082
      - DB_URL=jdbc:mysql://mysql-db:3306/hms_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
      - DB_USER=hms_user
      - DB_PASSWORD=hms_pass
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka/
      - EUREKA_INSTANCE_PREFER_IP_ADDRESS=true
    depends_on:
      mysql-db:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
    networks:
      - hms-network

  # API Gateway
  api-gateway:
    build:
      context: ./api-gateway
      dockerfile: Dockerfile
    container_name: hms-api-gateway
    ports:
      - "8080:8080"
    environment:
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka/
      - EUREKA_INSTANCE_PREFER_IP_ADDRESS=true
    depends_on:
      eureka-server:
        condition: service_healthy
    networks:
      - hms-network

  # Frontend Service
  frontend:
    build:
      context: ./Frontend
      dockerfile: Dockerfile
    container_name: hms-frontend
    ports:
      - "80:80"
    environment:
      - VITE_BACKEND_URL=http://localhost:8080
    depends_on:
      - api-gateway
    networks:
      - hms-network

volumes:
  mysql-data:

networks:
  hms-network:
    driver: bridge
